services:
  api:
    build:
      context: ..
      dockerfile: InteractHub_API/Dockerfile
    container_name: interacthub_api
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=Interact_Hub;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      ConnectionStrings__Redis: redis:6379
      REDIS_CONNECTION_STRING: redis:6379
      
      Neo4j__Uri: bolt://neo4j:7687
      Neo4j__User: neo4j
      Neo4j__Password: ${NEO4J_PASSWORD:-InteractHub123}

      Jwt__SecretKey: ${Jwt__SecretKey}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      SeedData__Enabled: ${SeedData__Enabled}
      SeedUsers__Admin__Email: ${SeedUsers__Admin__Email}
      SeedUsers__Admin__Password: ${SeedUsers__Admin__Password}
      SeedUsers__Admin__TenTaiKhoan: ${SeedUsers__Admin__TenTaiKhoan}
    ports:
      - "5153:8080"
    networks:
      - interacthub_net
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: InteractHub_Worker/Dockerfile
    # container_name: interacthub_worker
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=Interact_Hub;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      ConnectionStrings__Redis: redis:6379
      REDIS_CONNECTION_STRING: redis:6379
      # StreamKey ~ Topic (Kafka)
      # GroupName ~ Consumer Group (Kafka)
      # ConsumerName ~ Consumer (Kafka)
      RedisStreams__Notifications__StreamKey: interacthub:notifications:stream
      RedisStreams__Notifications__GroupName: interacthub-workers
      RedisStreams__Notifications__ConsumerName: worker-container
      RedisStreams__Notifications__BatchSize: 20
      RedisStreams__Notifications__IdleDelayMs: 1500

      Neo4j__Uri: bolt://neo4j:7687
      Neo4j__User: neo4j
      Neo4j__Password: ${NEO4J_PASSWORD:-InteractHub123}
    networks:
      - interacthub_net
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: interacthub_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - interacthub_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: interacthub_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interacthub_net
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    container_name: interacthub_neo4j
    ports:
      - "7474:7474" # Cổng để vào Web Browser từ máy thật (localhost:7474)
      - "7687:7687" # Cổng Bolt nếu bạn muốn code chạy ngoài Docker vẫn kết nối được
    environment:
      # Lấy pass từ file .env, nếu không có sẽ mặc định là InteractHub123
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-InteractHub123}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - interacthub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-InteractHub123} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  interacthub_net:
    driver: bridge

volumes:
  sqlserver_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
