# ============================================================
#  Upstream Groups
#  Docker Compose DNS tự resolve "api" -> tất cả replica đang chạy
# ============================================================

# REST API: round-robin — phân phối đều request giữa các replica
upstream api_backend {
    least_conn;   # uncomment để chuyển sang least-connections
    server api:8080;
    keepalive 32;   # connection pool, giảm TCP overhead
}

# SignalR WebSocket: ip_hash — sticky session (bắt buộc cho SignalR)
upstream api_signalr {
    ip_hash;
    server api:8080;
}

# ── Main entry point (port 80) ────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # ── REST API (load balanced — round-robin) ────────────────
    location /api/ {
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";           # required for keepalive upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── SignalR WebSocket (sticky — ip_hash) ──────────────────
    location /hubs/ {
        proxy_pass http://api_signalr/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Swagger UI (chỉ dùng khi Development) ───────────────
    location /swagger {
        proxy_pass http://api_backend/swagger;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger static assets & JSON spec
    location /swagger/ {
        proxy_pass http://api_backend/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Healthcheck ───────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Fallback ──────────────────────────────────────────────
    location / {
        return 404 "Not found\n";
        add_header Content-Type text/plain;
    }
}

# ── Backward-compatible port 5153 ─────────────────────────────────────────────
server {
    listen 5153;
    server_name _;
    client_max_body_size 100M;

    location /api/ {
